<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat Admin Dashboard</title>
  <style>
    body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
    #sidebar { width: 250px; border-right: 1px solid #ccc; overflow-y: auto; background: #f4f4f4; }
    .session-item { padding: 15px; border-bottom: 1px solid #ddd; cursor: pointer; }
    .session-item:hover { background: #e9e9e9; }
    .session-item.active { background: #007bff; color: white; }
    #chat-area { flex: 1; display: flex; flex-direction: column; }
    #messages { flex: 1; padding: 20px; overflow-y: auto; background: #fafafa; }
    .msg { margin-bottom: 10px; max-width: 70%; padding: 10px; border-radius: 8px; clear: both; }
    .msg.admin { background: #007bff; color: white; float: right; border-bottom-right-radius: 2px; }
    .msg.visitor { background: #e9ecef; color: black; float: left; border-bottom-left-radius: 2px; }
    #input-area { padding: 20px; border-top: 1px solid #ccc; display: flex; }
    #input-area input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
    #input-area button { padding: 10px 20px; font-size: 16px; margin-left: 10px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
    #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; color: white; flex-direction: column; z-index: 1000; }
    #login-overlay input { padding: 10px; font-size: 18px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="login-overlay">
    <h2>Admin Login</h2>
    <input type="password" id="secretPass" placeholder="Enter password (ILoveCoding123)">
    <button onclick="login()">Login</button>
  </div>

  <div id="sidebar"></div>
  
  <div id="chat-area">
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="textInput" placeholder="Type response..." disabled>
      <button onclick="sendReply()" disabled id="sendBtn">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let allMessages = [];
    let currentSession = null;

    function login() {
      const secret = document.getElementById('secretPass').value;
      socket.emit('joinAdmin', secret);
      document.getElementById('login-overlay').style.display = 'none';
    }

    socket.on('adminMessageHistory', (rows) => {
      allMessages = rows;
      renderSidebar();
    });

    socket.on('receiveAdminMessage', (msg) => {
      allMessages.push(msg);
      renderSidebar();
      if (msg.sessionId === currentSession) {
        renderMessages();
      }
    });

    function renderSidebar() {
      const sessions = [...new Set(allMessages.map(m => m.sessionId))];
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = '';
      
      sessions.forEach(sid => {
        const div = document.createElement('div');
        div.className = 'session-item' + (currentSession === sid ? ' active' : '');
        div.innerText = sid;
        div.onclick = () => {
          currentSession = sid;
          document.getElementById('textInput').disabled = false;
          document.getElementById('sendBtn').disabled = false;
          renderSidebar();
          renderMessages();
        };
        sidebar.appendChild(div);
      });
    }

    function renderMessages() {
      const msgs = allMessages.filter(m => m.sessionId === currentSession);
      const container = document.getElementById('messages');
      container.innerHTML = '';
      msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + m.senderRole;
        div.innerText = m.text;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    function sendReply() {
      const input = document.getElementById('textInput');
      const text = input.value.trim();
      if (!text || !currentSession) return;

      socket.emit('sendMessage', {
        sessionId: currentSession,
        senderRole: 'admin',
        text: text
      });
      input.value = '';
    }
  </script>
</body>
</html>
